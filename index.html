<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Iframe</title>
</head>
<body>
  <h1>Iframe post message</h1>
  <script>
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const orderId = urlParams.get('Pun');
    // Message must be snoonu-payment-success_[order_id]
    const message = `snoonu-payment-success_${orderId}`;

    window.opener.postMessage(message, "http://localhost:3000");
    window.opener.postMessage(message, "https://development.snoonu.com/");
    window.opener.postMessage(message, "https://snoonu.com/");
    window.close();
  </script>
</body>
</html>
